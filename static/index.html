<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AiStockQuote</title>
<link rel="stylesheet" href="/style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
  <h1>AiStockQuote</h1>
  <p>종목을 선택하면 상세 시세, 1개월 차트, AI 해설을 볼 수 있습니다.</p>
</header>

<nav class="tabs" id="market-tabs"></nav>

<main>
  <p class="market-desc" id="market-desc"></p>
  <div id="content"></div>
</main>

<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Stock Detail</h2>
      <button class="close-btn" id="close-modal">Close</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
